AWSTemplateFormatVersion: '2010-09-09'
Description: Trade Engine — Secrets Manager secrets

Parameters:
  StackName:
    Type: String
  IbUsername:
    Type: String
    NoEcho: true
  IbPassword:
    Type: String
    NoEcho: true
  IbAccountId:
    Type: String
    NoEcho: true
  IbMode:
    Type: String
    Default: paper
  GoogleOAuthClientId:
    Type: String
  GoogleOAuthClientSecret:
    Type: String
    NoEcho: true

Resources:

  # IB Gateway credentials — used by Lambdas and EC2 user data
  IbCredsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub trade-engine/ib-credentials-${StackName}
      Description: Interactive Brokers credentials for CP Gateway
      SecretString: !Sub |
        {
          "username": "${IbUsername}",
          "password": "${IbPassword}",
          "account_id": "${IbAccountId}",
          "mode": "${IbMode}"
        }

  # NinjaTrader API key — auto-generated, never manually set
  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub trade-engine/api-key-${StackName}
      Description: API key for NinjaTrader signal endpoint
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: api_key
        PasswordLength: 64
        ExcludeCharacters: '"@/\'

  # Google OAuth credentials — used by Cognito Identity Provider
  GoogleOAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub trade-engine/google-oauth-${StackName}
      Description: Google OAuth 2.0 credentials for Cognito federation
      SecretString: !Sub |
        {
          "client_id": "${GoogleOAuthClientId}",
          "client_secret": "${GoogleOAuthClientSecret}"
        }

Outputs:
  IbCredsSecretArn:
    Value: !Ref IbCredsSecret
  ApiKeySecretArn:
    Value: !Ref ApiKeySecret
  ApiKeySecretName:
    Value: !Sub trade-engine/api-key-${StackName}
  GoogleOAuthSecretArn:
    Value: !Ref GoogleOAuthSecret
