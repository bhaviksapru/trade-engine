AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Trade Engine — VPC, subnets, security groups, VPC endpoints.
  High-availability deployment: 3 public subnets, 3 private subnets,
  3 NAT Gateways (one per AZ), per-AZ private route tables.

Parameters:
  YourDesktopIp:
    Type: String
  StackName:
    Type: String

Resources:

# ── VPC ───────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-vpc-${StackName}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub trade-engine-igw-${StackName}

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

# ── Public Subnets (3 AZs) ────────────────────────────────────────────────────

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-1a-${StackName}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-1b-${StackName}

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-1c-${StackName}

# ── Private Subnets (3 AZs) ───────────────────────────────────────────────────

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-1a-${StackName}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-1b-${StackName}

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-1c-${StackName}

# ── NAT Gateways — one per AZ for HA ─────────────────────────────────────────
# Each AZ's private subnet routes through its own NAT Gateway.
# If one AZ loses its NAT, only workloads in that AZ are affected;
# Lambdas and Fargate tasks in the other two AZs continue uninterrupted.

  NatEip1:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-eip-1a-${StackName}

  NatEip2:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-eip-1b-${StackName}

  NatEip3:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-eip-1c-${StackName}

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip1.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-1a-${StackName}

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip2.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-1b-${StackName}

  NatGateway3:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip3.AllocationId
      SubnetId: !Ref PublicSubnet3
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-1c-${StackName}

# ── Public Route Table (shared — all public subnets route to IGW) ─────────────

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-rt-${StackName}

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet3RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

# ── Private Route Tables — one per AZ ────────────────────────────────────────
# HA pattern: each private subnet routes egress through its local NAT Gateway.
# An outage in one AZ's NAT does not disrupt egress in the other two AZs.

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-rt-1a-${StackName}

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-rt-1b-${StackName}

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway2

  PrivateSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  PrivateRouteTable3:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-rt-1c-${StackName}

  PrivateRoute3:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable3
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway3

  PrivateSubnet3RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable3

# ── Security Groups ───────────────────────────────────────────────────────────

  SgLambdaWorkers:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda workers — outbound to CP Gateway and VPC endpoints
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          DestinationSecurityGroupId: !Ref SgCpGateway
          Description: CP Gateway API
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationSecurityGroupId: !Ref SgVpcEndpoints
          Description: VPC endpoints for AWS services
      Tags:
        - Key: Name
          Value: !Sub sg-lambda-workers-${StackName}

  SgCpGateway:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CP Gateway EC2 — inbound from Lambda and Fargate, SSH from desktop
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref SgLambdaWorkers
          Description: Lambda workers (all 3 AZs)
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref SgFargate
          Description: Fargate dashboard API health checks
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Sub "${YourDesktopIp}/32"
          Description: SSH from desktop only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: IBKR servers via NAT
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4001
          CidrIp: 0.0.0.0/0
          Description: IBKR TWS ports
      Tags:
        - Key: Name
          Value: !Sub sg-cpgateway-${StackName}

  SgFargate:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate dashboard API — inbound from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref SgAlb
          Description: ALB only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationSecurityGroupId: !Ref SgVpcEndpoints
          Description: VPC endpoints (DynamoDB, SQS)
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          DestinationSecurityGroupId: !Ref SgCpGateway
          Description: CP Gateway health check
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Cognito JWKS validation
      Tags:
        - Key: Name
          Value: !Sub sg-fargate-${StackName}

  SgAlb:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — public HTTPS ingress, forwards to Fargate across all AZs
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Public HTTPS
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirects to HTTPS)
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: ALB direct listener
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          DestinationSecurityGroupId: !Ref SgFargate
          Description: Fargate tasks (all 3 AZs)
      Tags:
        - Key: Name
          Value: !Sub sg-alb-${StackName}

  SgVpcEndpoints:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC interface endpoints — HTTPS from all private resources (3 AZs)
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref SgLambdaWorkers
          Description: Lambda workers
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref SgFargate
          Description: Fargate tasks
      Tags:
        - Key: Name
          Value: !Sub sg-vpc-endpoints-${StackName}

# ── VPC Endpoints — all Interface endpoints deployed across all 3 private subnets

  DynamoDbEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcId: !Ref VPC
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2
        - !Ref PrivateRouteTable3
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: dynamodb:*
            Resource: '*'

  StatesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.states
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  SqsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sqs
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

Outputs:
  VpcId:
    Value: !Ref VPC

  # Public subnets — ALB spans all 3 AZs
  PublicSubnet1:
    Value: !Ref PublicSubnet1
  PublicSubnet2:
    Value: !Ref PublicSubnet2
  PublicSubnet3:
    Value: !Ref PublicSubnet3

  # Private subnets — Lambdas and Fargate span all 3 AZs
  PrivateSubnet1:
    Value: !Ref PrivateSubnet1
  PrivateSubnet2:
    Value: !Ref PrivateSubnet2
  PrivateSubnet3:
    Value: !Ref PrivateSubnet3

  SgLambdaWorkers:
    Value: !Ref SgLambdaWorkers
  SgCpGateway:
    Value: !Ref SgCpGateway
  SgFargate:
    Value: !Ref SgFargate
  SgAlb:
    Value: !Ref SgAlb
  SgVpcEndpoints:
    Value: !Ref SgVpcEndpoints

  # NAT Gateway EIPs — whitelist all 3 at IBKR if IP-based auth is required
  NatGateway1Ip:
    Description: NAT EIP — AZ-a (us-east-2a)
    Value: !Ref NatEip1
  NatGateway2Ip:
    Description: NAT EIP — AZ-b (us-east-2b)
    Value: !Ref NatEip2
  NatGateway3Ip:
    Description: NAT EIP — AZ-c (us-east-2c)
    Value: !Ref NatEip3
