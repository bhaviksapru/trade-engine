AWSTemplateFormatVersion: '2010-09-09'
Description: Trade Engine — VPC, subnets, security groups, VPC endpoints

Parameters:
  YourDesktopIp:
    Type: String
  StackName:
    Type: String

Resources:

# ── VPC ───────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-vpc-${StackName}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub trade-engine-igw-${StackName}

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

# ── Subnets ───────────────────────────────────────────────────────────────────

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-1-${StackName}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-2-${StackName}

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-1-${StackName}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-2-${StackName}

# ── NAT Gateway (1 AZ — sufficient at this scale) ─────────────────────────────

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub trade-engine-nat-${StackName}

# ── Route Tables ──────────────────────────────────────────────────────────────

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub trade-engine-public-rt-${StackName}

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub trade-engine-private-rt-${StackName}

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

# ── Security Groups ───────────────────────────────────────────────────────────

  # Lambda workers — need to reach CP Gateway (:5000) and VPC endpoints (:443)
  SgLambdaWorkers:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda workers — outbound to CP Gateway and VPC endpoints
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          DestinationSecurityGroupId: !Ref SgCpGateway
          Description: CP Gateway API
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationSecurityGroupId: !Ref SgVpcEndpoints
          Description: VPC endpoints for AWS services
      Tags:
        - Key: Name
          Value: !Sub sg-lambda-workers-${StackName}

  # EC2 CP Gateway — private, never public-facing
  SgCpGateway:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CP Gateway EC2 — inbound from Lambda, SSH from desktop only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref SgLambdaWorkers
          Description: Lambda workers
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Sub "${YourDesktopIp}/32"
          Description: SSH from desktop only — disable if using SSM Session Manager
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: IBKR servers via NAT
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4001
          CidrIp: 0.0.0.0/0
          Description: IBKR TWS ports
      Tags:
        - Key: Name
          Value: !Sub sg-cpgateway-${StackName}

  # Fargate dashboard API — only accepts traffic from ALB
  SgFargate:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate dashboard API — inbound from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref SgAlb
          Description: ALB only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationSecurityGroupId: !Ref SgVpcEndpoints
          Description: VPC endpoints (DynamoDB, EventBridge)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Cognito JWKS validation (external)
      Tags:
        - Key: Name
          Value: !Sub sg-fargate-${StackName}

  # ALB — public-facing, HTTPS only
  SgAlb:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — public HTTPS ingress, forwards to Fargate
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Public HTTPS
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirects to HTTPS)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          DestinationSecurityGroupId: !Ref SgFargate
          Description: Fargate tasks
      Tags:
        - Key: Name
          Value: !Sub sg-alb-${StackName}

  # VPC Endpoints — accept HTTPS from Lambda and Fargate
  SgVpcEndpoints:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC interface endpoints — HTTPS from private resources
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref SgLambdaWorkers
          Description: Lambda workers
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref SgFargate
          Description: Fargate tasks
      Tags:
        - Key: Name
          Value: !Sub sg-vpc-endpoints-${StackName}

# ── VPC Endpoints — avoids NAT Gateway charges for AWS services ───────────────

  # DynamoDB — Gateway endpoint (free)
  DynamoDbEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcId: !Ref VPC
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: dynamodb:*
            Resource: '*'

  # Step Functions — Interface endpoint
  StatesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.states
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  # Secrets Manager — Interface endpoint
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  # ECR API — Interface endpoint (for ECS pulling images)
  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  # ECR Docker — Interface endpoint
  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  # CloudWatch Logs — Interface endpoint
  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

  # SQS — Interface endpoint (for Fargate WebSocket poller)
  SqsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sqs
      VpcId: !Ref VPC
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SgVpcEndpoints]
      PrivateDnsEnabled: true

Outputs:
  VpcId:
    Value: !Ref VPC
  PublicSubnet1:
    Value: !Ref PublicSubnet1
  PublicSubnet2:
    Value: !Ref PublicSubnet2
  PrivateSubnet1:
    Value: !Ref PrivateSubnet1
  PrivateSubnet2:
    Value: !Ref PrivateSubnet2
  SgLambdaWorkers:
    Value: !Ref SgLambdaWorkers
  SgCpGateway:
    Value: !Ref SgCpGateway
  SgFargate:
    Value: !Ref SgFargate
  SgAlb:
    Value: !Ref SgAlb
  SgVpcEndpoints:
    Value: !Ref SgVpcEndpoints
  PrivateRouteTableId:
    Value: !Ref PrivateRouteTable
